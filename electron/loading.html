<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS - Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #0d9488, #06b6d4);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }
    .loader {
      width: 200px;
      height: 4px;
      background: #1e293b;
      border-radius: 4px;
      margin: 0 auto 16px;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #0d9488, #06b6d4, #0d9488);
      border-radius: 4px;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .status {
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">H</div>
    <h1>سیستم مدیریت بیمارستان</h1>
    <p class="subtitle">Hospital Management System</p>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <p class="status">در حال بارگذاری سرور...</p>
  </div>
</body>
</html>
