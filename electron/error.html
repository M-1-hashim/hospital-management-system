<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS - Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 450px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
      color: #f87171;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.8;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 28px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover { background: #0f766e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#9888;</div>
    <h1>خطا در راه‌اندازی سرور</h1>
    <p>
      سرور Next.js نتوانست راه‌اندازی شود.
      <br />
      لطفا مطمئن شوید که Node.js و تمام وابستگی‌ها نصب شده‌اند.
      <br />
      دوباره تلاش کنید.
    </p>
    <button class="btn" onclick="location.reload()">تلاش مجدد</button>
  </div>
</body>
</html>
